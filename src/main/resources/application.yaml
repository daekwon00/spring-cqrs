spring:
  application:
    name: spring-cqrs
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: kr.or.study.springcqrs
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8081