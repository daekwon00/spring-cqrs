spring:
  application:
    name: spring-cqrs
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: kr.or.study.springcqrs
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:spring-cqrs-local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-expiration: 3600000
  refresh-expiration: 604800000

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

ai:
  provider: ${AI_PROVIDER:anthropic}
  api-key: ${AI_API_KEY:not-configured}
  model: ${AI_MODEL:claude-sonnet-4-20250514}
  max-tokens: ${AI_MAX_TOKENS:1024}
  temperature: ${AI_TEMPERATURE:0.7}